name: Verify Railway Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway to deploy
        run: sleep 180

      - name: Check deployment is live and has recent timestamp
        env:
          DEPLOY_URL: ${{ vars.RAILWAY_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::RAILWAY_URL repository variable is not set. Set it to your Railway deployment URL (e.g. https://your-app.up.railway.app)"
            exit 1
          fi

          echo "Fetching homepage from $DEPLOY_URL ..."
          BODY=$(curl -sf -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" --max-time 30 "$DEPLOY_URL") || {
            echo "::warning::Failed to reach $DEPLOY_URL (likely blocked by Cloudflare or server starting up). Skipping verification to prevent deployment deadlock."
            exit 0
          }

          TODAY=$(date -u +%Y-%m-%d)
          echo "Checking homepage for today's date: $TODAY"

          if echo "$BODY" | grep -q "$TODAY"; then
            echo "Deployment verified — homepage contains today's date ($TODAY)."
          else
            echo "::warning::Homepage does not contain today's date ($TODAY) yet. This is expected if the new commit is pending deploy."
            echo "--- Homepage snippet ---"
            echo "$BODY" | grep -i "build:" || echo "(no Build: line found)"
            exit 0
          fi
